<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App KW</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 15px;
        background: #111;
        color: #fff;
      }
      #messages {
        list-style: none;
        padding: 0;
        margin-bottom: 70px;
      }
      #messages li {
        padding: 8px 12px;
        margin: 6px 0;
        background: #222;
        border-radius: 8px;
      }
      #form {
        position: fixed;
        bottom: 10px;
        left: 10px;
        right: 10px;
        display: flex;
      }
      #m {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px 0 0 8px;
        background: #333;
        color: #fff;
      }
      button {
        padding: 12px 20px;
        border: none;
        background: #0a84ff;
        color: white;
        border-radius: 0 8px 8px 0;
      }
    </style>
  </head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a84ff">
  <body>
    <h3>🔥 Chat Room</h3>
    <ul id="messages"></ul>
    <div id="form">
      <input id="m" autocomplete="off" placeholder="Ketik pesan..." />
      <button onclick="kirim()">Kirim</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const name = prompt("Masukin nama lu:") || "Anonim";
      socket.emit("new user", name);

      const m = document.getElementById("m");
      const messages = document.getElementById("messages");

      function kirim() {
        if (m.value) {
          socket.emit("chat message", m.value);
          m.value = "";
        }
      }

      m.addEventListener("keypress", (e) => {
        if (e.key === "Enter") kirim();
      });

      socket.on("chat message", (d) => {
        messages.innerHTML += `<li><b>${d.user}:</b> ${d.text}</li>`;
        window.scrollTo(0, document.body.scrollHeight);
      });
    </script>
  </body>
</html>
